name: Deploy

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  deploy-firestore:
    runs-on: ubuntu-latest
    if: ${{ vars.FIREBASE_PROJECT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: google-github-actions/setup-firebase@v2
        with:
          project_id: ${{ vars.FIREBASE_PROJECT_ID }}

      - name: Deploy Firestore rules and indexes
        run: firebase deploy --only firestore:rules,firestore:indexes --non-interactive

  deploy-hosting:
    runs-on: ubuntu-latest
    if: ${{ vars.FIREBASE_PROJECT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Build client
        run: npm run build:prod
        working-directory: client
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: google-github-actions/setup-firebase@v2
        with:
          project_id: ${{ vars.FIREBASE_PROJECT_ID }}

      - name: Deploy Firebase Hosting
        run: firebase deploy --only hosting --non-interactive
